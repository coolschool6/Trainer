<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PulsePlan | Coach</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-shell">
      <a class="brand" href="dashboard.html">
        <img src="assets/logo.svg" alt="PulsePlan" class="logo" />
        <span>
          <strong>PulsePlan</strong>
          <span>Self-hosted fitness coach</span>
        </span>
      </a>
      <body class="redirect-body">
        <main class="redirect-panel panel">
          <p class="kicker">PulsePlan update</p>
          <h1>The coach is now built into the dashboard.</h1>
          <p class="section-copy">Use the unified Fitness OS instead of a separate coach page.</p>
          <a class="btn primary" href="dashboard.html">Go to Dashboard</a>
        </main>
        <script>window.location.replace("dashboard.html");</script>
    <div id="onboard-modal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="onboard-title">
      <div class="modal-panel">
        <div class="panel-head">
          <div>
            <p class="kicker">Quick Onboarding</p>
            <h2 id="onboard-title">Create your starting plan</h2>
          </div>
          <button type="button" id="cancel-onboard" class="icon-btn" aria-label="Close">x</button>
        </div>
        <form id="onboard-form">
          <div class="form-grid">
            <label>Age<input name="age" type="number" min="10" max="120" required /></label>
            <label>Training age<select name="level"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></label>
            <label>Available days<select name="days"><option>2</option><option selected>3</option><option>4</option><option>5</option></select></label>
            <label>Equipment<select name="equipment"><option>Bodyweight</option><option>Dumbbells</option><option selected>Full gym</option><option>Resistance bands</option></select></label>
            <label>Goal<input name="goal" placeholder="Example: build muscle, faster 5K PB" value="Build muscle" required /></label>
            <label>Food target<select name="nutrition"><option>Maintenance</option><option>Calorie deficit</option><option selected>Lean surplus</option></select></label>
          </div>
          <div class="modal-actions">
            <button type="button" id="reset-demo" class="btn">Reset Demo</button>
            <button type="submit" class="btn primary">Generate Plan</button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
